<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dia de la madre</title>

<!-- Fuente Dela gothic one -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
    }

    .pantalla {
      width: 1800px;
      height: 540px;
      position: absolute;
      left: 0;
      top: 0;
      background-video: url('fondo.mp4');
      background-size: cover;
      background-position: center;
      transform-origin: top left;
    }

    .contenedor-frase {
      position: absolute;
      top: 230px;
      left: 43px;
      width: 880px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(255, 255, 255, 0);
    }

    #frase {
      font-size: 70px;
      color: white;
      font-family: "Dela Gothic One", sans-serif;
      font-weight: 600;
      letter-spacing: 2px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="pantalla" id="pantalla">
    <div class="contenedor-frase">
      <div id="frase">Cargando frase...</div>
    </div>
  </div>

 <script>
  const frases = [
"Usted no se manda solo.",
"Mientras viva bajo este techo, se hace lo que yo diga",
"No me abra los ojos que no le voy a echar gotas",
"Si sus amigos se tiran de un puente, ¿usted también?",
"Le entra por un odio y le sale por el otro",
"Cuento hasta 3... ",
"¡Búsqueme que me va a encontrar!",
"Algún día me lo va a agradecer.",
"Cuando tengas hijos, te vas a acordar de mí.",
  ];

  let index = 0;
  const elemento = document.getElementById("frase");

  function cambiarFrase() {
    elemento.textContent = frases[index];
    index = (index + 1) % frases.length;
  }

  cambiarFrase();
  setInterval(cambiarFrase, 5000);

  function escalarPantalla() {
    const escalaX = window.innerWidth / 1800;
    const escalaY = window.innerHeight / 540;

    // 🔑 usar Math.max para hacer que llene toda la pantalla
    const escala = Math.max(escalaX, escalaY);

    document.getElementById("pantalla").style.transform = `scale(${escala})`;
  }

  window.addEventListener("resize", escalarPantalla);
  escalarPantalla();
</script>
</body>
</html>
